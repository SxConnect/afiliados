version: '3.8'

services:
  # VPS License Server
  vps:
    image: ghcr.io/sxconnect/afiliados-vps:latest
    container_name: afiliados_vps_server
    restart: unless-stopped
    networks:
      - afiliados_vps_network
      - portainer_default
    environment:
      - NODE_ENV=production
      - PORT=4000
      # JWT Secret
      - JWT_SECRET=${JWT_SECRET:-seu-secret-super-seguro-mude-em-producao}
      # License Secret
      - LICENSE_SECRET=${LICENSE_SECRET:-seu-license-secret-mude-em-producao}
      # RSA Keys
      - PRIVATE_KEY=${PRIVATE_KEY}
      # Database
      - DATABASE_URL=postgresql://afiliados_vps_user:${DB_PASSWORD}@afiliados_vps_postgres:5432/afiliados_vps_licenses
      - DB_HOST=afiliados_vps_postgres
      - DB_PORT=5432
      - DB_NAME=afiliados_vps_licenses
      - DB_USER=afiliados_vps_user
      - DB_PASSWORD=${DB_PASSWORD}
      # Redis
      - REDIS_URL=redis://:${REDIS_PASSWORD}@afiliados_vps_redis:6379
      - REDIS_HOST=afiliados_vps_redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # Cache TTL
      - CACHE_TTL=3600
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.afiliados-vps.rule=Host(`${VPS_DOMAIN:-vps.afiliados.sxconnect.com.br}`)"
      - "traefik.http.routers.afiliados-vps.entrypoints=websecure"
      - "traefik.http.routers.afiliados-vps.tls=true"
      - "traefik.http.routers.afiliados-vps.tls.certresolver=leresolver"
      - "traefik.http.services.afiliados-vps.loadbalancer.server.port=4000"
      - "traefik.docker.network=portainer_default"
      # Rate Limiting
      - "traefik.http.routers.afiliados-vps.middlewares=afiliados-vps-ratelimit,afiliados-vps-headers"
      - "traefik.http.middlewares.afiliados-vps-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.afiliados-vps-ratelimit.ratelimit.period=15m"
      - "traefik.http.middlewares.afiliados-vps-ratelimit.ratelimit.burst=50"
      # Security Headers
      - "traefik.http.middlewares.afiliados-vps-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.afiliados-vps-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.afiliados-vps-headers.headers.stsPreload=true"
    depends_on:
      afiliados_vps_postgres:
        condition: service_healthy
      afiliados_vps_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL Database
  afiliados_vps_postgres:
    image: postgres:15-alpine
    container_name: afiliados_vps_postgres
    restart: unless-stopped
    networks:
      - afiliados_vps_network
      - portainer_default
    environment:
      - POSTGRES_USER=afiliados_vps_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-mude-esta-senha-em-producao}
      - POSTGRES_DB=afiliados_vps_licenses
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - afiliados_vps_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afiliados_vps_user -d afiliados_vps_licenses"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=false"

  # Redis Cache & Queue
  afiliados_vps_redis:
    image: redis:7-alpine
    container_name: afiliados_vps_redis
    restart: unless-stopped
    networks:
      - afiliados_vps_network
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-mude-esta-senha-redis}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - afiliados_vps_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-mude-esta-senha-redis}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=false"

  # Redis Commander (opcional - interface web para Redis)
  afiliados_vps_redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: afiliados_vps_redis_commander
    restart: unless-stopped
    networks:
      - afiliados_vps_network
      - portainer_default
    environment:
      - REDIS_HOSTS=afiliados:afiliados_vps_redis:6379:0:${REDIS_PASSWORD}
      - HTTP_USER=admin
      - HTTP_PASSWORD=${REDIS_COMMANDER_PASSWORD:-admin123}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.afiliados-redis.rule=Host(`redis.afiliados.sxconnect.com.br`)"
      - "traefik.http.routers.afiliados-redis.entrypoints=websecure"
      - "traefik.http.routers.afiliados-redis.tls=true"
      - "traefik.http.routers.afiliados-redis.tls.certresolver=leresolver"
      - "traefik.http.services.afiliados-redis.loadbalancer.server.port=8081"
      - "traefik.docker.network=portainer_default"
      # Basic Auth
      - "traefik.http.routers.afiliados-redis.middlewares=afiliados-redis-auth"
      - "traefik.http.middlewares.afiliados-redis-auth.basicauth.users=${REDIS_COMMANDER_HTPASSWD}"
    depends_on:
      afiliados_vps_redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  afiliados_vps_postgres_data:
    name: afiliados_vps_postgres_data
    driver: local
  afiliados_vps_redis_data:
    name: afiliados_vps_redis_data
    driver: local

networks:
  afiliados_vps_network:
    name: afiliados_vps_network
    driver: bridge
  portainer_default:
    external: true
