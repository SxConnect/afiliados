version: '3.8'

# Docker Compose para Produção - VPS License Server v2.0.0
# Arquitetura otimizada para 10K usuários

services:
  # Admin Panel - Next.js
  admin-panel:
    image: ghcr.io/sxconnect/afiliados-admin-panel:1.0.0
    container_name: admin-panel
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: http://vps:3000
    depends_on:
      - vps
    networks:
      - vps-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.seu-dominio.com`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls.certresolver=myresolver"
      - "traefik.http.services.admin.loadbalancer.server.port=3001"

  # VPS License Validation Server
  vps:
    image: ghcr.io/sxconnect/afiliados-vps:2.0.0
    container_name: vps-license-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Environment
      NODE_ENV: production
      PORT: 3000
      WORKERS: 2

      # Secrets (usar .env file)
      JWT_SECRET: ${JWT_SECRET}
      LICENSE_SECRET: ${LICENSE_SECRET}

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: afiliados_vps_licenses
      DB_USER: afiliados_vps_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_MAX: 20
      DB_POOL_MIN: 5

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CACHE_TTL: 300
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {let d='';r.on('data',c=>d+=c);r.on('end',()=>{try{const j=JSON.parse(d);process.exit(j.status==='ok'&&j.database?.connected?0:1)}catch(e){process.exit(1)}})})"
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - vps-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vps.rule=Host(`vps.seu-dominio.com`)"
      - "traefik.http.routers.vps.entrypoints=websecure"
      - "traefik.http.routers.vps.tls.certresolver=myresolver"
      - "traefik.http.services.vps.loadbalancer.server.port=3000"

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: afiliados_vps_licenses
      POSTGRES_USER: afiliados_vps_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afiliados_vps_user -d afiliados_vps_licenses"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vps-network
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=2621kB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "log_min_duration_statement=200"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vps-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vps-network

  # Traefik Reverse Proxy (opcional - se não tiver)
  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=seu-email@dominio.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-letsencrypt:/letsencrypt"
    networks:
      - vps-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.seu-dominio.com`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=myresolver"
      - "traefik.http.routers.dashboard.service=api@internal"

networks:
  vps-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  traefik-letsencrypt:
    driver: local

