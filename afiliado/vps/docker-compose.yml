version: '3.8'

services:
  vps:
    image: ghcr.io/sxconnect/afiliados/vps:latest
    container_name: afiliados-vps
    restart: unless-stopped
    
    ports:
      - "4000:4000"
    
    environment:
      - NODE_ENV=production
      - VPS_PORT=4000
      - JWT_SECRET=${JWT_SECRET}
      - PRIVATE_KEY=${PRIVATE_KEY}
    
    env_file:
      - .env
    
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/plans', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - vps-network
    
    labels:
      - "com.docker.compose.project=afiliados-vps"
      - "com.docker.compose.service=vps"
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vps-network:
    driver: bridge
